<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UAT Links Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            /* Lighter, softer background gradient */
            --bg-gradient: linear-gradient(135deg, #1e293b 0%, #312e81 100%);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.12);
            
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --primary-hover: #4338ca;
            
            --danger-gradient: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
            --danger-hover: #be123c;
            
            --success-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --secondary-bg: #475569;
            --secondary-hover: #64748b;

            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --text-dark: #0f172a;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Styles */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #c7d2fe, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Global Button Styles */
        .view-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 0.65rem 1.4rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .view-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
            opacity: 0.95;
        }

        .btn-danger { 
            background: var(--danger-gradient); 
            box-shadow: 0 4px 6px -1px rgba(225, 29, 72, 0.2);
        }
        .btn-danger:hover { box-shadow: 0 10px 15px -3px rgba(225, 29, 72, 0.4); }
        .btn-secondary { background: var(--secondary-bg); box-shadow: none; }
        .btn-secondary:hover { background: var(--secondary-hover); }
        .btn-success { 
            background: var(--success-gradient);
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }

        /* Container */
        .container {
            max-width: 1400px;
            width: 90%;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
            flex: 1;
            box-sizing: border-box;
        }

        /* View Panels */
        .view-panel { display: none; animation: fadeIn 0.4s ease; }
        .view-panel.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Grid Layouts for Admin view controls */
        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .admin-grid { grid-template-columns: 1fr; }
        }

        /* Card / Glassmorphism Design */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 1rem;
            border: 1px solid var(--card-border);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15);
        }

        .card h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Form Element Controls */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid var(--card-border);
            border-radius: 0.5rem;
            box-sizing: border-box;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }

        .form-group select option {
            background: #334155;
            color: var(--text-main);
        }

        /* Manage System Item Lists */
        .manage-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 320px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .manage-list::-webkit-scrollbar { width: 6px; }
        .manage-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .manage-list::-webkit-scrollbar-thumb { background: #64748b; border-radius: 10px; }

        .manage-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--card-border);
        }

        .manage-item:last-child { border-bottom: none; }
        
        .item-actions {
            display: flex;
            gap: 0.5rem;
        }

        .sm-btn {
            padding: 0.4rem 0.75rem;
            font-size: 0.8rem;
            border-radius: 0.375rem;
        }

        /* Side-By-Side Flex/Grid Setup for Dashboard Cards */
        .sections-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            align-items: start;
        }

        .section-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 1rem;
            border: 1px solid var(--card-border);
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .section-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .section-card h3 {
            margin-top: 0;
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 0.75rem;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            margin-top: 1.25rem;
        }

        /* Direct Route URL Grid Button elements */
        .uat-link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            color: #f1f5f9;
            text-decoration: none;
            padding: 0.9rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.95rem;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s ease;
        }

        .uat-link-btn:hover {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            transform: scale(1.02);
        }

        .uat-link-btn::after {
            content: '➔';
            font-size: 0.8rem;
            opacity: 0.7;
            transition: transform 0.2s;
        }

        .uat-link-btn:hover::after {
            transform: translateX(3px);
            opacity: 1;
        }

        .no-data {
            text-align: center;
            grid-column: 1 / -1;
            color: var(--text-muted);
            padding: 4rem 2rem;
            background: var(--card-bg);
            border-radius: 1rem;
            border: 2px dashed var(--card-border);
        }

        .file-input-wrapper {
            display: inline-block;
            position: relative;
        }
        
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0; top: 0; opacity: 0;
            width: 100%; height: 100%;
            cursor: pointer;
        }

        /* Secure Password Modal Window Overlay Styles */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: #1e293b;
            border: 1px solid var(--card-border);
            padding: 2rem;
            border-radius: 1rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-card h3 {
            margin-top: 0;
            font-size: 1.25rem;
            color: #ffffff;
            margin-bottom: 0.5rem;
        }

        .modal-card p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        /* Footer Styles */
        .dashboard-footer {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--card-border);
            padding: 1.25rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: auto;
        }

        .dashboard-footer a {
            color: #a5b4fc;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .dashboard-footer a:hover {
            color: #c7d2fe;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <h1 id="page-title">🚀 UAT Links Dashboard</h1>
        <button id="toggle-view-btn" class="view-btn" onclick="openLoginModal()">⚙️ Admin View</button>
    </nav>

    <div class="container">
        
        <div id="user-view" class="view-panel active">
            <div id="sections-display" class="sections-container">
                <div class="no-data"><h3>⌛ Loading configuration database...</h3></div>
            </div>
        </div>

        <div id="admin-view" class="view-panel">
            
            <div class="card" style="display: flex; gap: 1.5rem; justify-content: space-between; align-items: center
